services:
  - type: web
    name: global-ai-news-tracker-api
    runtime: python
    rootDir: backend
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENABLE_LIVE_FETCH
        value: true
      - key: REFRESH_MINUTES
        value: 3
      - key: SOURCE_TIMEOUT_SECONDS
        value: 4
      - key: ALLOWED_ORIGINS
        value: https://global-ai-news-tracker.vercel.app,http://localhost:3000
      - key: PYTHON_VERSION
        value: 3.12.8
